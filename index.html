<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 800px;
            margin-top: 2rem;
        }

        .project-card {
            display: flex;
            flex-direction: column;
            padding: 2.5rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .project-card:nth-child(2) {
            animation-delay: 0.6s;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 100%);
            z-index: 1;
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        .project-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: var(--shadow-glow);
            border-color: rgba(59, 130, 246, 0.4);
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            z-index: 2;
        }

        .project-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            z-index: 2;
        }

        .project-desc {
            color: var(--text-secondary);
            line-height: 1.5;
            z-index: 2;
        }

        /* Distinctive colors for icons */
        .task-icon {
            background: linear-gradient(135deg, #60a5fa, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .nessus-icon {
            background: linear-gradient(135deg, #34d399, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Central Hub</h1>
            <h2>Select a project to begin</h2>
        </header>

        <div class="projects-grid">
            <a href="task-manager.html" target="_blank" class="project-card glass-card">
                <div class="project-icon task-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 Z"/></svg>
                </div>
                <div class="project-title">Task Manager</div>
                <div class="project-desc">Track day-to-day tasks. Create, mark as completed, and stay organized.</div>
            </a>

            <a href="nessus-comparison.html" target="_blank" class="project-card glass-card">
                <div class="project-icon nessus-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
                </div>
                <div class="project-title">Nessus Comparison</div>
                <div class="project-desc">Upload and compare Nessus scan files. Analyze differences easily.</div>
            </a>
        </div>
    </div>
</body>
</html>
